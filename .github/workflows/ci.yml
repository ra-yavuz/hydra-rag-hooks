name: ci

# Unified CI shape across ra-yavuz/* packaged repos.
#
#   lint        ruff + shellcheck
#   build-deb   produces dist/*.deb, uploaded as artifact "dist"
#   release     tag-only. Downloads dist, creates GitHub Release, then
#               dispatches the .deb to ra-yavuz/apt for auto-publish.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck scripts/build-deb.sh scripts/get.sh debian/postinst debian/postrm
      - name: Lint Python
        run: ruff check lib/ bin/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml numpy pathspec pytest
      - name: Run tests (unit only, no embedder)
        run: |
          PYTHONPATH=lib pytest tests/ -q

  build-deb:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev
      - name: Build .deb
        run: bash scripts/build-deb.sh
      - name: Inspect .deb
        run: |
          dpkg-deb -I dist/*.deb
          dpkg-deb -c dist/*.deb
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*.deb

  release:
    runs-on: ubuntu-latest
    needs: build-deb
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify ra-yavuz/apt to auto-publish
        if: env.APT_DISPATCH_TOKEN != ''
        env:
          APT_DISPATCH_TOKEN: ${{ secrets.APT_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          for deb in dist/*.deb; do
            [ -f "$deb" ] || continue
            arch=$(dpkg-deb -f "$deb" Architecture)
            url="https://github.com/${{ github.repository }}/releases/download/${tag}/$(basename "$deb")"
            echo "Dispatching $deb -> ra-yavuz/apt"
            curl -fsSL -X POST \
              -H "Authorization: token $APT_DISPATCH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/ra-yavuz/apt/dispatches" \
              -d "{\"event_type\":\"package-published\",\"client_payload\":{\"repo\":\"${{ github.repository }}\",\"tag\":\"${tag}\",\"arch\":\"${arch}\",\"deb_url\":\"${url}\"}}"
          done
